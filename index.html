  <title>Draw Survivors</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#050914;color:#eaf2ff;font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 32%,#1d3157 0,#091222 38%,#030711 100%)}
    main{width:min(920px,92vw);padding:40px;border:1px solid #94a3b838;border-radius:28px;background:linear-gradient(145deg,rgba(20,31,54,.96),rgba(7,12,24,.96));box-shadow:0 32px 90px #0009;position:relative;overflow:hidden}main:before{content:"";position:absolute;width:380px;height:380px;border-radius:50%;right:-180px;top:-220px;background:#4f46e544;filter:blur(30px)}
    .eyebrow{font-size:12px;letter-spacing:.22em;color:#67e8f9;font-weight:800}h1{font-size:clamp(48px,8vw,82px);line-height:.88;margin:16px 0 20px;letter-spacing:-.065em}p{max-width:620px;color:#b6c3d7;line-height:1.75}.versions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:30px}.version{display:block;text-decoration:none;color:inherit;border:1px solid #65769c66;border-radius:18px;background:#14213d99;padding:20px;transition:.2s;min-height:150px}.version:hover{transform:translateY(-3px);border-color:#67e8f9;background:#193052}.version.disabled{opacity:.4;pointer-events:none}.tag{display:inline-block;font-size:11px;border-radius:99px;padding:4px 9px;background:#155e75;color:#cffafe;font-weight:800}.version b{display:block;font-size:22px;margin:10px 0}.version small{color:#9eabc0;line-height:1.6}.foot{margin-top:24px;color:#75849d;font-size:12px}@media(max-width:650px){main{padding:27px}.versions{grid-template-columns:1fr}}

    </div>
    <div class="foot">纯静态页面 · 可直接部署至 GitHub Pages</div>
  </main>
